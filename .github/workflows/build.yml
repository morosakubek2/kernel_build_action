# .github/workflows/build-b2q.yml
name: Build Kernel - Samsung Flip3 (b2q)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 🐎 Build Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: 🔧 Build Kernel
        uses: morosakubek2/kernel_build_action@main
        with:
          # 📁 Źródło kernela
          kernel-url: https://github.com/morosakubek2/flip_3_android_kernel_samsung_sm8350
          kernel-branch: Flip3-Android16
          
          # ⚙️ Konfiguracja
          config: gki_defconfig
          arch: arm64
          
          # 🔧 Toolchain: ZyCromerZ Clang (URL do .tar.gz)
          aosp-clang: false
          aosp-gcc: false
          other-clang-url: https://github.com/ZyCromerZ/Clang/releases/download/14.0.6-20250704-release/Clang-14.0.6-20250704.tar.gz
          other-clang-branch: main  # Ignorowane przy .tar.gz, ale wymagane
          
          # 🧩 Opcje buildu
          ksu: false
          rekernel: false
          nethunter: false
          lxc: false
          kvm: false
          bbg: false
          disable-lto: true      # Szybszy build, mniejszy kernel
          ccache: true           # ~3x szybsze kolejne buildy
          
          # 📦 Pakowanie
          anykernel3: true
          anykernel3-url: https://github.com/morosakubek2/AnyKernel3
          
          # 🔑 Dodatkowe flagi make (JSON array!)
          extra-make-args: '["LLVM=1", "LLVM_IAS=1", "GCC_TOOLCHAIN=", "WERROR=0"]'
          
          # 🚀 Release
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
