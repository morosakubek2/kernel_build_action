name: Build Kernel
on:
  workflow_dispatch:
  workflow_call:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Build Kernel
      uses: morosakubek2/kernel_build_action@main
      with:
          kernel-url: https://github.com/morosakubek2/android_kernel_samsung_b2q
          kernel-dir: main
          branch: main
          config: vendor/b2q_eur_openx_defconfig
          arch: arm64
          aosp-gcc: false
          aosp-clang: false
          other-clang-url: https://github.com/ravindu644/Toolchains_for_Snapdragon/tree/84b1fd1c43ce774b82616b7f74113c83c433fbd9/llvm-arm-toolchain-ship-10.0
          ksu: true
          ksu-version: main
          android-version: 14
          aosp-clang-version: r498229b
          python-27: ture
          disable-lto: true
          anykernel3: true
          ccache: true
          apatch: false
